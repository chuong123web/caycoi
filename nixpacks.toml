[phases.setup]
nixPkgs = ['...', 'nodejs_20', 'python3']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm ci']

[phases.build]
cmds = ['npm run build', 'php artisan storage:link --force || true', 'php artisan config:clear', 'php artisan route:clear', 'php artisan view:clear', 'php artisan cache:clear || true', 'php artisan migrate --force', 'php artisan db:seed --force || true']
