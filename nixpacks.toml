[phases.setup]
nixPkgs = ['...', 'nodejs_20']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm ci']

[phases.build]
cmds = ['npm run build', 'php artisan config:cache', 'php artisan route:cache', 'php artisan view:cache', 'php artisan migrate --force']

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
